name: Setup Nix with store cache
description: >
  Install Nix and restore/save the store with cache-nix-action so jobs skip
  re-downloading the dev shell toolchain. Unlike setups whose store drifts
  between runs, this repo's store is fully determined by flake.nix and
  flake.lock, so the cache key is just their hash: one entry per flake
  change, shared by every workflow and job, and saved only when the flake
  changes. Old entries roll off through GitHub's built-in cache eviction,
  so no purge permissions are needed.

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
      with:
        github_access_token: ${{ github.token }}
        nix_conf: |
          access-tokens = github.com=${{ github.token }}

    - name: Cache Nix store
      uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
        # Warm the store from the newest previous entry when the flake
        # changed, so only the delta is fetched from the substituters.
        restore-prefixes-first-match: nix-${{ runner.os }}-

    - name: Fix single-user Nix store ownership
      shell: bash
      run: |
        for path in /nix/var/log/nix /nix/var/nix; do
          if [ -e "$path" ]; then
            sudo chown -R "$USER:$(id -gn)" "$path"
          fi
        done
