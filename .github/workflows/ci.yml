name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix-cache
      - name: Install dependencies
        run: nix develop --command vp install --frozen-lockfile
      - name: Check
        run: nix develop --command vp run check
      # Continuous preview releases: every push and PR gets an installable
      # npm package on pkg.pr.new. The check step already built dist via the
      # test task, and pkg-pr-new packs with the pnpm workspace context so
      # catalog: specifiers resolve.
      - name: Publish preview package
        run: nix develop --command vp exec pkg-pr-new publish --pnpm
