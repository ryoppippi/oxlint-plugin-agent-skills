name: tagpr

on:
  push:
    branches:
      - main
  # Toggling tagpr:minor / tagpr:major labels on the release PR should update
  # its proposed version right away, instead of waiting for the next push to
  # main to make tagpr recompute it.
  pull_request:
    types:
      - labeled
      - unlabeled
  workflow_dispatch:

concurrency: tagpr

jobs:
  tagpr:
    # Label events only matter on tagpr's own release PR; skip the rest so
    # ordinary PR labelling doesn't spend runner time.
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'tagpr-from-')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: read
    outputs:
      tag: ${{ steps.tagpr.outputs.tag }}
    steps:
      # persist-credentials stays on (default) so tagpr can push the release PR and tag
      # ref: main because on pull_request events the default checkout is the
      # PR merge ref, while tagpr always operates on the release branch.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0
      - id: tagpr
        uses: Songmu/tagpr@d1b8138b7a31075141b6cd64103de9485ced7ac9 # v1.20.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The release jobs below run in this workflow instead of a tag-triggered one
  # because tags pushed with GITHUB_TOKEN do not trigger `on: push: tags`
  # workflows. They run only when tagpr just tagged a release-PR merge, and
  # check out that tag explicitly. To retry a failed release, re-run only the
  # failed jobs: a full re-run finds no new tag and skips everything.
  npm:
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.tagpr.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-nix-cache
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - run: nix develop --command vp install --frozen-lockfile
      # pnpm resolves catalog: specifiers and runs the prepack build; npm
      # would publish the manifest verbatim. --no-git-checks because the
      # checkout is a detached tag, not a branch.
      - run: nix develop --command pnpm publish --provenance --access public --no-git-checks

  release:
    needs:
      - tagpr
      - npm
    if: needs.tagpr.outputs.tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      # changelogithub resolves the release tag with `git tag --points-at HEAD`,
      # so checking out the tag is what makes it pick the right release
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.tagpr.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-nix-cache
      - run: nix develop --command vp install --frozen-lockfile
      - run: nix develop --command vp exec changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
